name: 'Setup'
description: 'Sets up the project, installs dependencies, caches results'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 24.18
        cache: yarn
    - run: corepack enable
      shell: bash
    - run: yarn install --frozen-lockfile
      shell: bash
